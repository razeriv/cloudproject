{% extends 'layout.html' %}
{% block content %}
<h2 class="mb-4 text-warning">🏅 Команды</h2>
<div class="row g-4">
  {% for t in teams %}
  <div class="col-md-4 col-lg-3">
    <a href="/team/{{ t.id }}" class="text-decoration-none text-light">
      <div class="card bg-black border-secondary h-100 team-card">
        <div class="card-body text-center">
          <h5 class="card-title text-warning">{{ t.name }}</h5>
          <p class="text-secondary">{{ t.country }}</p>
        </div>
      </div>
    </a>
  </div>
  {% endfor %}
</div>
{% endblock %}
