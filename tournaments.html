{% extends 'layout.html' %}
{% block content %}
<h2 class="mb-4 text-warning">🏆 Турниры</h2>
<div class="row g-4">
  {% for t in tournaments %}
  <div class="col-md-6 col-lg-4">
    <a href="/tournament/{{ t.id }}" class="text-decoration-none text-light">
      <div class="card bg-black border-secondary h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title text-warning">{{ t.name }}</h5>
          <p class="mb-1">📍 {{ t.location }}</p>
          <p class="mb-1">📅 {{ t.year }}</p>
          <p class="text-muted">💰 {{ t.prize_money }}</p>
        </div>
      </div>
    </a>
  </div>
  {% endfor %}
</div>
{% endblock %}
